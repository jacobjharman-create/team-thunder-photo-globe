<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Team Thunder Photo Wall</title>
    <meta name="description" content="Swipeable Team Thunder photo wall with an infinite curved gallery." />
    <meta name="theme-color" content="#03050a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Photo Globe" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.webmanifest?v=longpress-delete-pwa" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon.svg" />
    <link rel="stylesheet" href="photo-wall.css?v=longpress-delete-pwa" />
  </head>
  <body>
    <main class="applet" aria-label="Team Thunder swipeable photo wall">
      <header class="topbar">
        <a class="brand" href="https://teamthunderwrestling.com/" aria-label="Team Thunder home">
          <span class="brand-mark">TT</span>
          <span>Team Thunder</span>
        </a>
        <div class="actions">
          <output id="photo-count" class="photo-count" aria-live="polite"></output>
          <label class="icon-button" title="Add photos" aria-label="Add photos">
            <input id="photo-input" type="file" accept="image/*" multiple />
            <span aria-hidden="true">+</span>
          </label>
          <button id="reset-photos" class="icon-button danger" type="button" title="Remove added photos" aria-label="Remove added photos">
            <span aria-hidden="true">x</span>
          </button>
        </div>
      </header>

      <section class="stage" aria-label="Swipe gallery">
        <div class="glow glow-left" aria-hidden="true"></div>
        <div class="glow glow-right" aria-hidden="true"></div>
        <div id="wall" class="wall" tabindex="0">
          <canvas id="globe-canvas" aria-label="Interactive photo globe"></canvas>
        </div>
      </section>
    </main>

    <script src="photo-wall.js?v=longpress-delete-pwa"></script>
  </body>
</html>
